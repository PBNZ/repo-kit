name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate manifests and skills
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "jsonschema>=4" "pyyaml>=6"

      - name: Validate marketplace.json
        run: python scripts/validate_marketplace.py

      - name: Validate plugin manifest
        run: python scripts/validate_plugins.py

      - name: Validate SKILL.md frontmatter
        run: python scripts/validate_skills.py

      - name: Check for private contact info
        run: python scripts/check_no_private_contact.py

      - name: Scan SKILL.md bodies for safety issues
        run: python scripts/check_skill_safety.py

  smoke-powershell-module:
    name: Smoke-test powershell-module templates (pwsh on Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install PSScriptAnalyzer and Pester
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          Install-Module Pester -Force -Scope CurrentUser

      - name: Stamp templates and verify the module works
        run: ./scripts/smoke_test_powershell_module.ps1

  no-auto-close:
    name: Block auto-close keywords
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Reject closing keywords targeting an issue
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          pat='\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\b:?[[:space:]]+(#[0-9]+|https://github\.com/[^ ]+/issues/[0-9]+)'
          fail=0
          if printf '%s' "$PR_BODY" | grep -qiE "$pat"; then
            echo "::error::Closing keyword in the PR body - use 'Refs #NN'; a human closes after verifying."
            fail=1
          fi
          if git log "origin/$BASE_REF..HEAD" --format=%B | grep -qiE "$pat"; then
            echo "::error::Closing keyword in a commit message - use 'Refs #NN'."
            fail=1
          fi
          exit $fail

  self-check:
    name: RepoKit compliance self-check (dogfood)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Run repokit-check against this repo
        shell: pwsh
        run: ./plugins/repokit/skills/new-repo/templates/core/scripts/repokit-check.ps1

  smoke-repokit-check:
    name: Smoke-test repokit-check (pwsh on Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Prove the check passes clean and fails on each drift case
        shell: pwsh
        run: ./scripts/smoke_test_repokit_check.ps1

  smoke-living-docs:
    name: Smoke-test living-docs add-on (pwsh on Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Stamp the add-on and verify check-docs enforces
        run: ./scripts/smoke_test_living_docs.ps1
